<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Consulta de Prazo de Entrega — Grupo Premisse</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal-900: #0D3D4A;
  --teal-700: #165F72;
  --teal-500: #1E8099;
  --teal-300: #59B8CC;
  --teal-100: #C8E9EF;
  --teal-50:  #EBF7FA;
  --cyan:     #4DBFCC;
  --white:    #FFFFFF;
  --gray-50:  #F5F8F9;
  --gray-100: #E8EDEF;
  --gray-300: #B8CDD1;
  --gray-500: #6E9299;
  --text:     #0F2D35;
  --radius:   10px;
  --radius-sm: 6px;
}

html, body {
  height: 100%;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--teal-900);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 40px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: 16px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 12px 40px rgba(13,61,74,.22), 0 4px 10px rgba(13,61,74,.10);
  overflow: hidden;
  margin-top: 16px;
}

/* ── HEADER ── */
.card-header {
  background: var(--white);
  padding: 24px 32px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.logo-wrap {
  padding-bottom: 16px;
}
.logo-wrap img {
  height: 48px;
  width: auto;
  display: block;
}
.accent-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--teal-700), var(--cyan), var(--teal-300));
  border-radius: 2px;
  width: 100%;
  margin-bottom: 18px;
}
.card-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--teal-900);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
  text-align: center;
}
.card-subtitle {
  font-size: 12.5px;
  color: var(--gray-500);
  text-align: center;
  margin-bottom: 22px;
  line-height: 1.5;
}

/* ── BODY ── */
.card-body {
  padding: 0 32px 28px;
}

/* ── FIELD GROUP ── */
.field-group {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: relative;
}
label {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--teal-700);
  user-select: none;
}

/* ── INPUT ── */
.input-wrap {
  position: relative;
}
.input-wrap input {
  width: 100%;
  height: 48px;
  padding: 0 36px 0 13px;
  border: 1.5px solid var(--gray-100);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  background: var(--gray-50);
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
  cursor: pointer;
  -webkit-appearance: none;
}
.input-wrap input:focus {
  border-color: var(--teal-500);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(30,128,153,.13);
}
.input-wrap input::placeholder {
  color: var(--gray-300);
  font-weight: 400;
}
.input-wrap input.has-value {
  background: var(--white);
  border-color: var(--teal-300);
}
.chevron {
  position: absolute;
  right: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray-500);
  pointer-events: none;
  transition: transform .18s, color .15s;
  font-size: 11px;
  line-height: 1;
}
.input-wrap.open .chevron {
  transform: translateY(-50%) rotate(180deg);
  color: var(--teal-500);
}

/* ── DROPDOWN ── */
.dropdown {
  position: absolute;
  top: calc(100% + 5px);
  left: 0; right: 0;
  background: var(--white);
  border: 1.5px solid var(--teal-100);
  border-radius: var(--radius);
  box-shadow: 0 6px 20px rgba(13,61,74,.14), 0 2px 6px rgba(13,61,74,.08);
  z-index: 9999;
  display: none;
  overflow: hidden;
}
.dropdown.visible {
  display: block;
  animation: dropIn .13s ease;
}
@keyframes dropIn {
  from { opacity:0; transform: translateY(-5px); }
  to   { opacity:1; transform: translateY(0); }
}
.dropdown-search {
  padding: 9px 10px 7px;
  border-bottom: 1px solid var(--gray-100);
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 2;
}
.dropdown-search input {
  width: 100%;
  height: 32px;
  padding: 0 10px;
  border: 1.5px solid var(--gray-100);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text);
  background: var(--gray-50);
  outline: none;
  -webkit-appearance: none;
}
.dropdown-search input:focus {
  border-color: var(--teal-300);
  background: var(--white);
}
.dropdown-list {
  list-style: none;
  padding: 4px 0;
  max-height: 230px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.dropdown-list::-webkit-scrollbar { width: 4px; }
.dropdown-list::-webkit-scrollbar-track { background: transparent; }
.dropdown-list::-webkit-scrollbar-thumb { background: var(--teal-100); border-radius: 4px; }

.dropdown-list li {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 13px;
  font-size: 13.5px;
  color: var(--text);
  cursor: pointer;
  transition: background .08s;
  -webkit-tap-highlight-color: transparent;
}
.dropdown-list li:hover,
.dropdown-list li.kbd-active {
  background: var(--teal-50);
  color: var(--teal-700);
}
.dropdown-list li.selected-item {
  background: var(--teal-50);
  color: var(--teal-700);
  font-weight: 600;
}
.uf-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 20px;
  background: var(--teal-700);
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  border-radius: 4px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  padding: 0 4px;
}
.state-name { flex: 1; }
.city-name  { flex: 1; }
.dropdown-list li mark {
  background: #FFF176;
  color: var(--teal-900);
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}
.dropdown-empty {
  padding: 16px 13px;
  font-size: 13px;
  color: var(--gray-500);
  text-align: center;
  font-style: italic;
}
.dropdown-footer {
  padding: 6px 13px;
  font-size: 10.5px;
  color: var(--gray-500);
  border-top: 1px solid var(--gray-100);
  text-align: right;
  background: var(--gray-50);
  position: sticky;
  bottom: 0;
}

/* ── RESULT BOX ── */
.result-box {
  border-radius: var(--radius);
  background: var(--teal-50);
  border: 1.5px solid var(--teal-100);
  padding: 18px 18px;
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 78px;
  transition: background .3s, border-color .3s;
}
.result-box.loaded {
  background: linear-gradient(135deg, var(--teal-900) 0%, var(--teal-700) 100%);
  border-color: var(--teal-700);
}
.result-box.not-found {
  background: #FFF5F2;
  border-color: #FFCABC;
}
.result-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  background: rgba(30,128,153,.10);
}
.result-box.loaded   .result-icon { background: rgba(255,255,255,.15); }
.result-box.not-found .result-icon { background: #FFE8E0; }
.result-content { flex: 1; min-width: 0; }
.result-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--teal-500);
  margin-bottom: 3px;
}
.result-box.loaded    .result-label { color: rgba(255,255,255,.65); }
.result-box.not-found .result-label { color: #C0614A; }
.result-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--teal-900);
  line-height: 1.1;
}
.result-box.loaded    .result-value { color: var(--white); }
.result-box.not-found .result-value { color: #C0614A; font-size: 14px; font-weight: 500; }
.result-sub {
  font-size: 11.5px;
  color: var(--gray-500);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.result-box.loaded    .result-sub { color: rgba(255,255,255,.65); }

/* ── CLEAR BTN ── */
.btn-clear {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  height: 40px;
  margin-top: 12px;
  background: none;
  border: 1.5px solid var(--gray-100);
  border-radius: var(--radius-sm);
  color: var(--gray-500);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-clear:hover, .btn-clear:active {
  border-color: var(--teal-300);
  color: var(--teal-700);
  background: var(--teal-50);
}

/* ── FOOTER ── */
.card-footer {
  padding: 13px 32px;
  background: var(--gray-50);
  border-top: 1px solid var(--gray-100);
}
.footer-text {
  font-size: 10.5px;
  color: var(--gray-500);
  text-align: center;
  display: block;
}

/* ── MOBILE ── */
@media (max-width: 480px) {
  body {
    padding: 12px 10px 32px;
    align-items: flex-start;
    background: var(--teal-900);
  }
  .card {
    border-radius: 12px;
    margin-top: 8px;
  }
  .card-header { padding: 20px 20px 0; }
  .card-body   { padding: 0 20px 24px; }
  .card-footer { padding: 12px 20px; }
  .logo-wrap img { height: 40px; }
  .card-title  { font-size: 15px; }
  .card-subtitle { font-size: 12px; }

  .field-group {
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .input-wrap input { height: 52px; font-size: 16px; /* prevent iOS zoom */ }
  .dropdown-list { max-height: 200px; }
  .dropdown-list li { padding: 11px 13px; font-size: 14px; }
  .result-value { font-size: 20px; }
  .result-box { min-height: 70px; }
}
</style>
</head>

const STATE_NAMES = {"AC": "Acre", "AL": "Alagoas", "AM": "Amazonas", "AP": "Amapá", "BA": "Bahia", "CE": "Ceará", "DF": "Distrito Federal", "ES": "Espírito Santo", "GO": "Goiás", "MA": "Maranhão", "MG": "Minas Gerais", "MS": "Mato Grosso do Sul", "MT": "Mato Grosso", "PA": "Pará", "PB": "Paraíba", "PE": "Pernambuco", "PI": "Piauí", "PR": "Paraná", "RJ": "Rio de Janeiro", "RN": "Rio Grande do Norte", "RO": "Rondônia", "RR": "Roraima", "RS": "Rio Grande do Sul", "SC": "Santa Catarina", "SE": "Sergipe", "SP": "São Paulo", "TO": "Tocantins"};

// ── STATE ────────────────────────────────────────────────────────
let selectedEstado = null;
let selectedCidade = null;
let cidadeTimeout  = null;
// Flag to prevent focus event from reopening dropdown right after a state selection click
let suppressCidadeFocus = false;

const states = Object.keys(PRAZOS).sort();

// ── DOM REFS ─────────────────────────────────────────────────────
const inpEstado    = document.getElementById('inp-estado');
const wrapEstado   = document.getElementById('wrap-estado');
const ddEstado     = document.getElementById('dd-estado');
const searchEstado = document.getElementById('search-estado');
const listEstado   = document.getElementById('list-estado');

const inpCidade    = document.getElementById('inp-cidade');
const wrapCidade   = document.getElementById('wrap-cidade');
const ddCidade     = document.getElementById('dd-cidade');
const listCidade   = document.getElementById('list-cidade');
const footerCidade = document.getElementById('footer-cidade');

const resultBox    = document.getElementById('result-box');
const resultIcon   = document.getElementById('result-icon');
const resultLabel  = document.getElementById('result-label');
const resultValue  = document.getElementById('result-value');
const resultSub    = document.getElementById('result-sub');

// ── UTILS ────────────────────────────────────────────────────────
function norm(s) {
  return s.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function hl(text, q) {
  if (!q) return text;
  const t = norm(text), f = norm(q);
  const i = t.indexOf(f);
  if (i === -1) return text;
  return text.slice(0, i) + '<mark>' + text.slice(i, i + q.length) + '</mark>' + text.slice(i + q.length);
}

function isOpen(dd) { return dd.classList.contains('visible'); }

// ── CLOSE ALL ────────────────────────────────────────────────────
function closeAll() {
  ddEstado.classList.remove('visible');
  wrapEstado.classList.remove('open');
  ddCidade.classList.remove('visible');
  wrapCidade.classList.remove('open');
}

// ══════════════════════════════════════════════════════════════════
// ESTADO DROPDOWN
// ══════════════════════════════════════════════════════════════════
function renderEstados(filter) {
  const f = norm(filter || '');
  const matches = states.filter(st =>
    norm(st).includes(f) || norm(STATE_NAMES[st] || '').includes(f)
  );
  if (!matches.length) {
    listEstado.innerHTML = '<li class="dropdown-empty">Nenhum estado encontrado</li>';
    return;
  }
  listEstado.innerHTML = '';
  matches.forEach(st => {
    const li = document.createElement('li');
    const name = STATE_NAMES[st] || '';
    li.innerHTML = `<span class="uf-badge">${st}</span><span class="state-name">${hl(name, filter)}</span>`;
    if (st === selectedEstado) li.classList.add('selected-item');
    li.addEventListener('mousedown', e => {
      // mousedown fires BEFORE blur — use this to avoid focus/blur race conditions
      e.preventDefault();
      chooseEstado(st);
    });
    listEstado.appendChild(li);
  });
}

function openEstado() {
  closeAll();
  ddEstado.classList.add('visible');
  wrapEstado.classList.add('open');
  renderEstados('');
  searchEstado.value = '';
  // Small delay so dropdown is visible before focus steals events
  setTimeout(() => searchEstado.focus(), 30);
}

function chooseEstado(st) {
  selectedEstado = st;
  selectedCidade = null;
  inpEstado.value = st + ' — ' + (STATE_NAMES[st] || '');
  inpEstado.classList.add('has-value');
  inpCidade.value = '';
  inpCidade.classList.remove('has-value');
  inpCidade.placeholder = 'Selecione a cidade...';

  // Close estado, then open cidade — but suppress the focus event
  // that would fire when we programmatically focus inpCidade
  ddEstado.classList.remove('visible');
  wrapEstado.classList.remove('open');

  updateResult();

  // Open cidade dropdown after a tick so the click event fully settles
  suppressCidadeFocus = true;
  setTimeout(() => {
    suppressCidadeFocus = false;
    openCidade();
    inpCidade.focus();
  }, 50);
}

inpEstado.addEventListener('mousedown', e => {
  e.preventDefault(); // prevent blur on active cidade input
  if (isOpen(ddEstado)) closeAll();
  else openEstado();
});

// touch support
inpEstado.addEventListener('touchend', e => {
  e.preventDefault();
  if (isOpen(ddEstado)) closeAll();
  else openEstado();
});

searchEstado.addEventListener('input', () => renderEstados(searchEstado.value));
searchEstado.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAll();
  if (e.key === 'Enter') {
    const first = listEstado.querySelector('li:not(.dropdown-empty)');
    if (first) first.dispatchEvent(new MouseEvent('mousedown', {bubbles: true}));
  }
});

// ══════════════════════════════════════════════════════════════════
// CIDADE DROPDOWN
// ══════════════════════════════════════════════════════════════════
function getCidadeList() {
  if (selectedEstado) return Object.keys(PRAZOS[selectedEstado] || {}).sort();
  return [];
}

function renderCidades(query) {
  const q = norm((query || '').trim());
  listCidade.innerHTML = '';
  footerCidade.style.display = 'none';

  if (selectedEstado) {
    const all = getCidadeList();
    const matches = q ? all.filter(c => norm(c).includes(q)) : all;

    if (!matches.length) {
      listCidade.innerHTML = `<li class="dropdown-empty">Nenhuma cidade em ${selectedEstado} com "${query}"</li>`;
      return;
    }
    const show = matches.slice(0, 150);
    const frag = document.createDocumentFragment();
    show.forEach(cidade => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="city-name">${hl(cidade, query)}</span>`;
      if (cidade === selectedCidade) li.classList.add('selected-item');
      li.addEventListener('mousedown', e => { e.preventDefault(); chooseCidade(cidade); });
      li.addEventListener('touchend',  e => { e.preventDefault(); chooseCidade(cidade); });
      frag.appendChild(li);
    });
    listCidade.appendChild(frag);
    if (matches.length > 150) {
      footerCidade.textContent = `Mostrando 150 de ${matches.length} — continue digitando`;
      footerCidade.style.display = 'block';
    }
  } else {
    // No state selected: search across all
    if (!q) {
      listCidade.innerHTML = '<li class="dropdown-empty">Selecione um Estado ou comece a digitar</li>';
      return;
    }
    const starts = [], contains = [];
    for (const st of states) {
      for (const c of Object.keys(PRAZOS[st])) {
        const nc = norm(c);
        if (nc.startsWith(q)) starts.push({c, st});
        else if (nc.includes(q)) contains.push({c, st});
        if (starts.length + contains.length >= 120) break;
      }
      if (starts.length + contains.length >= 120) break;
    }
    const matches = [...starts, ...contains].slice(0, 80);
    if (!matches.length) {
      listCidade.innerHTML = '<li class="dropdown-empty">Nenhuma cidade encontrada</li>';
      return;
    }
    const frag = document.createDocumentFragment();
    matches.forEach(({c, st}) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="uf-badge">${st}</span><span class="city-name">${hl(c, query)}</span>`;
      li.addEventListener('mousedown', e => {
        e.preventDefault();
        selectedEstado = st;
        inpEstado.value = st + ' — ' + (STATE_NAMES[st] || '');
        inpEstado.classList.add('has-value');
        chooseCidade(c);
      });
      li.addEventListener('touchend', e => {
        e.preventDefault();
        selectedEstado = st;
        inpEstado.value = st + ' — ' + (STATE_NAMES[st] || '');
        inpEstado.classList.add('has-value');
        chooseCidade(c);
      });
      frag.appendChild(li);
    });
    listCidade.appendChild(frag);
    if (starts.length + contains.length > 80) {
      footerCidade.textContent = 'Mostrando os 80 primeiros resultados';
      footerCidade.style.display = 'block';
    }
  }
}

function openCidade() {
  ddCidade.classList.add('visible');
  wrapCidade.classList.add('open');
  renderCidades(inpCidade.value);
}

function closeCidade() {
  ddCidade.classList.remove('visible');
  wrapCidade.classList.remove('open');
}

function chooseCidade(cidade) {
  selectedCidade = cidade;
  inpCidade.value = cidade;
  inpCidade.classList.add('has-value');
  closeCidade();
  updateResult();
}

inpCidade.addEventListener('focus', () => {
  if (suppressCidadeFocus) return;
  openCidade();
});

inpCidade.addEventListener('input', () => {
  clearTimeout(cidadeTimeout);
  if (!isOpen(ddCidade)) openCidade();
  cidadeTimeout = setTimeout(() => renderCidades(inpCidade.value), 100);
});

inpCidade.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCidade(); inpCidade.blur(); }
  if (e.key === 'Enter') {
    const first = listCidade.querySelector('li:not(.dropdown-empty)');
    if (first) first.dispatchEvent(new MouseEvent('mousedown', {bubbles: true}));
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const items = listCidade.querySelectorAll('li:not(.dropdown-empty)');
    if (items.length) items[0].classList.add('kbd-active');
  }
});

// Chevron cidade — touchend for mobile
wrapCidade.querySelector('.chevron').addEventListener('mousedown', e => {
  e.preventDefault();
  if (isOpen(ddCidade)) closeCidade();
  else { openCidade(); inpCidade.focus(); }
});
wrapCidade.querySelector('.chevron').addEventListener('touchend', e => {
  e.preventDefault();
  if (isOpen(ddCidade)) closeCidade();
  else openCidade();
});

// ── RESULT ───────────────────────────────────────────────────────
function updateResult() {
  if (!selectedEstado || !selectedCidade) {
    resultBox.className = 'result-box';
    resultIcon.textContent  = '🚚';
    resultLabel.textContent = 'Prazo de entrega';
    resultValue.textContent = '— dias';
    resultSub.textContent   = selectedEstado ? 'Selecione a cidade' : 'Preencha os campos acima';
    return;
  }
  const prazo = PRAZOS[selectedEstado]?.[selectedCidade];
  if (prazo === undefined) {
    resultBox.className = 'result-box not-found';
    resultIcon.textContent  = '⚠️';
    resultLabel.textContent = 'Não encontrado';
    resultValue.textContent = 'Cidade não está na base';
    resultSub.textContent   = 'Verifique a grafia ou entre em contato';
    return;
  }
  resultBox.className = 'result-box loaded';
  resultIcon.textContent  = '✓';
  resultLabel.textContent = 'Prazo de entrega estimado';
  resultValue.textContent = prazo === 1 ? '1 dia útil' : `${prazo} dias úteis`;
  resultSub.textContent   = `${selectedCidade} · ${STATE_NAMES[selectedEstado] || selectedEstado}`;
}

// ── CLEAR ────────────────────────────────────────────────────────
function clearAll() {
  selectedEstado = null;
  selectedCidade = null;
  inpEstado.value = '';
  inpCidade.value = '';
  inpCidade.placeholder = 'Digite ou selecione...';
  inpEstado.classList.remove('has-value');
  inpCidade.classList.remove('has-value');
  closeAll();
  updateResult();
}

// ── CLOSE ON OUTSIDE CLICK / TOUCH ───────────────────────────────
document.addEventListener('mousedown', e => {
  if (!wrapEstado.contains(e.target) && !wrapCidade.contains(e.target)) closeAll();
});
document.addEventListener('touchend', e => {
  if (!wrapEstado.contains(e.target) && !wrapCidade.contains(e.target)) closeAll();
}, { passive: true });
</script>
